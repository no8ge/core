---
kind: Service
apiVersion: v1
metadata:
  name: "{{ .Release.Name }}"
  labels:
    app: "{{ .Release.Name }}"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/v1.0/metrics"
    prometheus.io/port: "8080"
spec:
  selector:
    app: "{{ .Release.Name }}"
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}"
  labels:
    app: "{{ .Release.Name }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}"
    spec:
      initContainers:
        - name: init
          image: "{{ .Values.registry }}/{{ .Values.repository }}/{{ .Values.image }}:{{ .Chart.AppVersion}}"
          imagePullPolicy: Always
          command:
            - "/bin/sh"
            - "-c"
          args:
            - "./core init"
          env:  
            - name: NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: SERVICE_NAME
              value: "{{ .Release.Name }}"             
          volumeMounts:
            - name: certs
              mountPath: /core/cert
      containers:
        - name: "{{ .Release.Name }}"
          image: "{{ .Values.registry }}/{{ .Values.repository }}/{{ .Values.image }}:{{ .Chart.AppVersion}}"
          command:
            - "sh"
          args:
            - "-c"
            - "./core server"
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
          env:
            - name: NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: SERVICE_NAME
              value: "{{ .Release.Name }}"              
          volumeMounts:
            - name: certs
              mountPath: /core/cert
      volumes:
        - name: certs
          emptyDir: {}
